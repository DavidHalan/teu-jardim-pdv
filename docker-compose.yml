services:
  db:
    image: postgres:16-alpine
    container_name: teu-jardim-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pdv}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pdv}
      POSTGRES_DB: ${POSTGRES_DB:-teu_jardim}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pdv} -d ${POSTGRES_DB:-teu_jardim}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  db_data:

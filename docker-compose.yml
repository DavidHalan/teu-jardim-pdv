services:
  db:
    image: postgres:16-alpine
    container_name: teu-jardim-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pdv}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pdv}
      POSTGRES_DB: ${POSTGRES_DB:-teu_jardim}
      # Senha da role de runtime (pdv_app, não-superuser) criada por db/init em volume novo.
      PDV_APP_PASSWORD: ${PDV_APP_PASSWORD:-pdv_app}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pdv} -d ${POSTGRES_DB:-teu_jardim}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  db_data:

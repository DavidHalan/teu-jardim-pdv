name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: pdv
          POSTGRES_PASSWORD: pdv
          POSTGRES_DB: teu_jardim
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U pdv -d teu_jardim"
          --health-interval 10s --health-timeout 5s --health-retries 5

    env:
      # App roda como pdv_app (não-superuser); migrations como pdv (ADR-0025).
      DATABASE_URL: postgresql://pdv_app:pdv_app@localhost:5432/teu_jardim?schema=public
      MIGRATION_DATABASE_URL: postgresql://pdv:pdv@localhost:5432/teu_jardim?schema=public
      JWT_SECRET: ci-test-secret-not-for-production
      # Chave do consumer de impressão (F-6) — e2e usa o mesmo default do .env.example.
      PRINT_SERVICE_API_KEY: dev-print-key-change-me

    steps:
      - uses: actions/checkout@v4

      - name: Enable Corepack (pnpm)
        run: corepack enable

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Create app role (pdv_app)
        run: |
          docker exec ${{ job.services.postgres.id }} psql -U pdv -d teu_jardim -v ON_ERROR_STOP=1 \
            -c "DO \$\$ BEGIN IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'pdv_app') THEN CREATE ROLE pdv_app LOGIN PASSWORD 'pdv_app'; END IF; END \$\$;"

      - name: Apply migrations
        run: pnpm --filter @teu-jardim/api exec prisma migrate deploy

      - name: Test (unit)
        run: pnpm test

      - name: Test (e2e)
        run: pnpm --filter @teu-jardim/api test:e2e
